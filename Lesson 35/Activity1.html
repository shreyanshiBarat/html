<!DOCTYPE html>
<HTML>
    <head>
<title>Navbar</title>
<style>
    body {
background-color: rgb(249, 253, 253);
color: black;
font-style: normal;
font-size: medium;
nav-down: auto;
.topnav {
    overflow:hidden;
    background-color: #333;
}
.topnav a {
    float: left;
    color: #1affa3;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
font-size: 17px;
}
.topnav a:hover {
    background-color: #ddd;
}
.topnav a.active {
    background-color: #ffeB56;
    color: black;
}
        }
    </style>
    </head>
    <body>
        <div class="topnav">
            <a class="active" href="#Home">Home</a>
            <a href="#">About_Us</a>
            <a href="#">Gallery</a>
            <a href="#">Contact_Us</a>
        </div>
    </body>
</HTML>

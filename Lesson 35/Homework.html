<!DOCTYPE html>
<HTML>
    <head>
<title>Navbar</title>
<style>
    body {
background-color: rgb(31, 233, 233);
color: rgb(196, 14, 14);
font-style: normal;
font-size: medium;
nav-down: auto;
.topnav {
    overflow:hidden;
    background-color:  rgb(31, 233, 233);
}
.topnav a {
    float: left;
    color: #e2e608;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
font-size: 17px;
}
.topnav a:hover {
    background-color: #ddd;
}
.topnav a.active {
    background-color: #ffeB56;
    color: black;
}
        }
    </style>
    </head>
    <body>
        <div class="topnav">
            <a class="active" href="#Home">Home</a>
            <a href="#">About_Us</a>
            <a href="#">Menu</a>
            <a href="#">places found in</a>
            <a href="#">offers</a>
            <a href="#">Food Gallery</a>
            <a href="#">Contact_Us</a>
        </div>
    </body>
</HTML>

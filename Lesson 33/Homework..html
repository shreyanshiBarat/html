<!DOCTYPE html>
<html>
<head>
  <title>Auto Counting Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #counter {
      font-size: 48px;
      margin: 20px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Auto Counting Project</h1>
  <div id="counter">0</div>
  <button onclick="startCounting()">Start</button>
  <button onclick="stopCounting()">Stop</button>
  <button onclick="reset()">Reset</button>
</body>
</html>
